spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/promoguard
    username: promoguard
    password: promoguard
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      idle-timeout: 30000
      pool-name: PromoGuardHikariCP

  flyway:
    baseline-on-migrate: true

  data:
    redis:
      host: redis
      port: 6379

  kafka:
    bootstrap-servers: kafka:9092
    producer:
      batch-size: 131072         # 128KB batch size
      buffer-memory: 67108864     # 64MB buffer
      properties:
        linger.ms: 5              # Wait up to 5ms to batch messages
        max.block.ms: 2000        # Prevent virtual thread pinning by failing fast (2s) instead of 60s
        compression.type: lz4     # LZ4 compression for high throughput

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8082/realms/PromoGuard
          jwk-set-uri: http://keycloak:8080/realms/PromoGuard/protocol/openid-connect/certs

  threads:
    virtual:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    prometheus:
      enabled: true


app:
  keycloak:
    client-id: promoguard-web

springdoc:
  swagger-ui:
    oauth:
      client-id: promoguard-web
      use-pkce-with-authorization-code-grant: true

server:
  tomcat:
    max-connections: 10000
    accept-count: 2000