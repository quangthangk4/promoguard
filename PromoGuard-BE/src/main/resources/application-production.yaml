spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/promoguard
    username: promoguard
    password: promoguard

  flyway:
    baseline-on-migrate: true

  data:
    redis:
      host: redis
      port: 6379

  kafka:
    bootstrap-servers: kafka:9092

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8082/realms/PromoGuard
          jwk-set-uri: http://keycloak:8080/realms/PromoGuard/protocol/openid-connect/certs

  threads:
    virtual:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    prometheus:
      enabled: true


app:
  keycloak:
    client-id: promoguard-web

springdoc:
  swagger-ui:
    oauth:
      client-id: promoguard-web
      use-pkce-with-authorization-code-grant: true