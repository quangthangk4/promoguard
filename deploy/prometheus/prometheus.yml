global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'promoguard-app'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
          - 'host.docker.internal:8080'
        labels:
          application: 'promoguard-app'

  - job_name: 'keycloak'
    metrics_path: '/metrics'
    static_configs:
      - targets:
          - 'keycloak:9000'
        labels:
          application: 'keycloak'

  - job_name: 'postgres-exporter'
    static_configs:
      - targets:
          - 'postgres-exporter:9187'

  - job_name: 'redis-exporter'
    static_configs:
      - targets:
          - 'redis-exporter:9121'

  - job_name: 'kafka-exporter'
    static_configs:
      - targets:
          - 'kafka-exporter:9308'

  - job_name: 'nginx-exporter'
    static_configs:
      - targets:
          - 'nginx-exporter:9113'