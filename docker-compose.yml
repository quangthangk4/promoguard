services:
  app:
    build:
      context: ./PromoGuard-BE
      dockerfile: Dockerfile
    container_name: promoguard-app
    profiles:
      - full
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-production}
      JAVA_TOOL_OPTIONS: "-Djdk.tracePinnedThreads=short"

      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/promoguard
      SPRING_DATASOURCE_USERNAME: promoguard
      SPRING_DATASOURCE_PASSWORD: promoguard

      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379

      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

      SPRING_THREADS_VIRTUAL_ENABLED: "true"

      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus,metrics
      MANAGEMENT_ENDPOINT_PROMETHEUS_ENABLED: "true"

      # Nếu app chạy trong Docker nhưng token issuer là localhost:8082,
      # dùng JWK Set URI nội bộ để app container lấy public key từ Keycloak.
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://${VPS_IP:-localhost}:8082/realms/PromoGuard
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/PromoGuard/protocol/openid-connect/certs

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
      keycloak:
        condition: service_started
    networks:
      - promoguard-network

  postgres:
    image: postgres:16
    container_name: promoguard-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: promoguard
      POSTGRES_USER: promoguard
      POSTGRES_PASSWORD: promoguard
    volumes:
      - postgres-data:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "max_connections=300"
      - "-c"
      - "shared_buffers=256MB"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U promoguard -d promoguard"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - promoguard-network

  redis:
    image: redis:7.2-alpine
    container_name: promoguard-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - promoguard-network

  kafka:
    image: apache/kafka:4.1.2
    container_name: promoguard-kafka
    ports:
      # 9094 cho app chạy từ IntelliJ ở máy host
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://${VPS_IP:-localhost}:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - promoguard-network

  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: promoguard-kafka-ui
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: promoguard-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      - kafka
    networks:
      - promoguard-network

  keycloak-postgres:
    image: postgres:16
    container_name: promoguard-keycloak-postgres
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - keycloak-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - promoguard-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.3
    container_name: promoguard-keycloak
    ports:
      - "8082:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin

      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak

      KC_HOSTNAME: http://${VPS_IP:-localhost}:8082
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    command:
      - start-dev
      - --import-realm
      - --metrics-enabled=true
    volumes:
      - ./deploy/keycloak/import:/opt/keycloak/data/import:ro
    depends_on:
      keycloak-postgres:
        condition: service_healthy
    networks:
      - promoguard-network

  nginx:
    image: nginx:stable-alpine
    container_name: promoguard-nginx
    profiles:
      - full
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - promoguard-network

  prometheus:
    image: prom/prometheus:latest
    container_name: promoguard-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - promoguard-network

  grafana:
    image: grafana/grafana:latest
    container_name: promoguard-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - promoguard-network

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: promoguard-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://promoguard:promoguard@postgres:5432/promoguard?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - promoguard-network

  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0-alpine
    container_name: promoguard-redis-exporter
    environment:
      REDIS_ADDR: "redis://redis:6379"
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - promoguard-network

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    container_name: promoguard-kafka-exporter
    restart: on-failure
    command: ["--kafka.server=kafka:9092"]
    ports:
      - "9308:9308"
    depends_on:
      - kafka
    networks:
      - promoguard-network

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.1.0
    container_name: promoguard-nginx-exporter
    profiles:
      - full
    command: ["-nginx.scrape-uri=http://nginx:80/nginx_status"]
    ports:
      - "9113:9113"
    depends_on:
      - nginx
    networks:
      - promoguard-network

volumes:
  postgres-data:
  redis-data:
  kafka-data:
  keycloak-postgres-data:
  grafana-data:

networks:
  promoguard-network:
    driver: bridge